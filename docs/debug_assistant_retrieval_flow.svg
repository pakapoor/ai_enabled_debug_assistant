<svg xmlns="http://www.w3.org/2000/svg" width="680" height="530" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="680" height="530" fill="#f6f8fa" rx="10"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8c959f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="34" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2328">Retrieval Flow</text>

  <!-- Box 1: Query -->
  <rect x="215" y="52" width="250" height="44" rx="6" fill="#0969da"/>
  <text x="340" y="79" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">User Query  (natural language)</text>

  <line x1="340" y1="96" x2="340" y2="116" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Query Understanding -->
  <rect x="120" y="116" width="440" height="68" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="340" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">Query Understanding</text>
  <text x="340" y="160" text-anchor="middle" font-size="11" fill="#656d76">LLM → { signal, file, function, negations, confidence }</text>
  <text x="340" y="176" text-anchor="middle" font-size="11" fill="#cf222e">confidence = "low"  →  return follow-up question  (no search)</text>

  <line x1="340" y1="184" x2="340" y2="204" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3a: BM25 -->
  <rect x="60" y="204" width="260" height="60" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="190" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2328">BM25 Full-text Search</text>
  <text x="190" y="248" text-anchor="middle" font-size="11" fill="#656d76">PostgreSQL tsvector</text>
  <text x="190" y="260" text-anchor="middle" font-size="11" fill="#656d76">top-10 candidates</text>

  <!-- Box 3b: Vector -->
  <rect x="360" y="204" width="260" height="60" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="490" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2328">Vector Cosine Search</text>
  <text x="490" y="248" text-anchor="middle" font-size="11" fill="#656d76">pgvector · 384-dim</text>
  <text x="490" y="260" text-anchor="middle" font-size="11" fill="#656d76">top-10 candidates</text>

  <!-- Merge lines -->
  <line x1="190" y1="264" x2="190" y2="294" stroke="#8c959f" stroke-width="1.5"/>
  <line x1="490" y1="264" x2="490" y2="294" stroke="#8c959f" stroke-width="1.5"/>
  <line x1="190" y1="294" x2="490" y2="294" stroke="#8c959f" stroke-width="1.5"/>
  <line x1="340" y1="294" x2="340" y2="314" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: RRF -->
  <rect x="120" y="314" width="440" height="68" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="340" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">Custom RRF Scoring</text>
  <text x="340" y="358" text-anchor="middle" font-size="11" fill="#656d76">base_score = 100 − (rank × 5)</text>
  <text x="340" y="374" text-anchor="middle" font-size="11" fill="#656d76">+ bug boost (+50)  ·  − doc penalty (−30)  →  top-3 chunks</text>

  <line x1="340" y1="382" x2="340" y2="402" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 5: LLM -->
  <rect x="120" y="402" width="440" height="52" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="340" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">LLM  (Gemini / Groq / Ollama)</text>
  <text x="340" y="444" text-anchor="middle" font-size="11" fill="#656d76">grounded prompt  →  TLDR / EXPLANATION / CODE</text>

  <line x1="340" y1="454" x2="340" y2="474" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 6: React UI -->
  <rect x="190" y="474" width="300" height="44" rx="6" fill="#1a7f37"/>
  <text x="340" y="496" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">React UI  ·  port 3000</text>
  <text x="340" y="512" text-anchor="middle" font-size="11" fill="#d3f8de">TL;DR  ·  Explanation  ·  Code Fix  ·  Citations</text>
</svg>
