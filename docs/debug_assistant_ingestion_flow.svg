<svg xmlns="http://www.w3.org/2000/svg" width="620" height="450" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="620" height="450" fill="#f6f8fa" rx="10"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8c959f"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2328">Ingestion Flow</text>

  <!-- Box 1: Git Repo -->
  <rect x="155" y="52" width="310" height="52" rx="6" fill="#0969da"/>
  <text x="310" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Your Git Repository</text>
  <text x="310" y="94" text-anchor="middle" font-size="11" fill="#cae8ff">cloned to  ~/rag_data/your-project</text>

  <line x1="310" y1="104" x2="310" y2="124" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage label 1 -->
  <text x="108" y="152" font-size="10" font-weight="700" fill="#8c959f">STAGE 1</text>

  <!-- Box 2: Stage 1 -->
  <rect x="100" y="124" width="420" height="68" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="310" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">ingest_commits.py</text>
  <text x="310" y="168" text-anchor="middle" font-size="11" fill="#656d76">Reads git log · extracts subject, body, author, date, full patch</text>
  <text x="310" y="184" text-anchor="middle" font-size="11" fill="#656d76">→ parent chunks  (source_type: git_commit)</text>

  <line x1="310" y1="192" x2="310" y2="212" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage label 2 -->
  <text x="108" y="240" font-size="10" font-weight="700" fill="#8c959f">STAGE 2</text>

  <!-- Box 3: Stage 2 -->
  <rect x="100" y="212" width="420" height="68" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="310" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">create_patch_child_chunks.py</text>
  <text x="310" y="256" text-anchor="middle" font-size="11" fill="#656d76">Python AST parsing · enclosing class + function per hunk</text>
  <text x="310" y="272" text-anchor="middle" font-size="11" fill="#656d76">→ child chunks  (source_type: git_patch_file)  up to 120-line function context</text>

  <line x1="310" y1="280" x2="310" y2="300" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage label 3 -->
  <text x="108" y="328" font-size="10" font-weight="700" fill="#8c959f">STAGE 3</text>

  <!-- Box 4: Stage 3 -->
  <rect x="100" y="300" width="420" height="68" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="310" y="324" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2328">app/compute_embeddings.py</text>
  <text x="310" y="344" text-anchor="middle" font-size="11" fill="#656d76">BGE-small-en-v1.5 · 384-dimensional vectors · CPU inference</text>
  <text x="310" y="360" text-anchor="middle" font-size="11" fill="#656d76">→ embedding column written per chunk</text>

  <line x1="310" y1="368" x2="310" y2="388" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 5: PostgreSQL -->
  <rect x="155" y="388" width="310" height="44" rx="6" fill="#1a7f37"/>
  <text x="310" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">PostgreSQL + pgvector</text>
  <text x="310" y="426" text-anchor="middle" font-size="11" fill="#d3f8de">chunks table  ·  ~2,000 rows  ·  vector(384)</text>
</svg>
